name: Job Watcher
on:
  schedule:
    - cron: '0 7,11,15,19 * * 1-5'  # 4x/jour en semaine (9h, 13h, 17h, 21h heure FR)
  workflow_dispatch: {}  # Exécution manuelle

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore SQLite DB cache
        uses: actions/cache@v4
        with:
          path: data/job-watcher.db
          key: job-watcher-db
          restore-keys: job-watcher-db

      - run: npm ci

      - name: Run Job Watcher
        run: npx tsx src/index.ts
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
